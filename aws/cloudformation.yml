AWSTemplateFormatVersion: '2010-09-09'
Description: >
  JARVIS Business Command Center - Complete AWS Infrastructure
  Target: Under $20/month using t3.micro/small + Cognito free tier

# ==============================================================================
# Parameters
# ==============================================================================
Parameters:
  EnvironmentName:
    Type: String
    Default: jarvis-prod
    Description: Name prefix for all resources

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
    Description: EC2 instance type (t3.micro ~$7.60/mo, t3.small ~$15.20/mo)

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair for SSH access

  AllowedSSHIP:
    Type: String
    Default: 0.0.0.0/0
    Description: IP address allowed for SSH access (CIDR notation, e.g. 203.0.113.50/32)
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'
    ConstraintDescription: Must be a valid CIDR block (e.g. 203.0.113.50/32)

  VolumeSize:
    Type: Number
    Default: 20
    MinValue: 8
    MaxValue: 50
    Description: EBS volume size in GB

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 AMI (auto-resolved via SSM)

# ==============================================================================
# Resources
# ==============================================================================
Resources:

  # ────────────────────────────────────────────────────────────────────────────
  # VPC & Networking
  # ────────────────────────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-igw'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-subnet'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-rt'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ────────────────────────────────────────────────────────────────────────────
  # Security Groups
  # ────────────────────────────────────────────────────────────────────────────
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for JARVIS EC2 instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from anywhere
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from anywhere
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHIP
          Description: SSH from allowed IP only
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: All outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-ec2-sg'

  MySQLSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for MySQL - only accessible from EC2
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: MySQL from EC2 only
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-mysql-sg'

  # ────────────────────────────────────────────────────────────────────────────
  # Cognito User Pool
  # ────────────────────────────────────────────────────────────────────────────
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: jarvis-user-pool
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      MfaConfiguration: 'OFF'
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: false
          Mutable: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      UserPoolAddOns:
        AdvancedSecurityMode: 'OFF'
      UserPoolTags:
        Name: !Sub '${EnvironmentName}-user-pool'

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: jarvis-app-client
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      ReadAttributes:
        - email
        - name
        - email_verified
      WriteAttributes:
        - email
        - name

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub '${EnvironmentName}-${AWS::AccountId}'
      UserPoolId: !Ref CognitoUserPool

  # ────────────────────────────────────────────────────────────────────────────
  # IAM Role for EC2 (SSM access for remote management)
  # ────────────────────────────────────────────────────────────────────────────
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-ec2-role'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${EnvironmentName}-ec2-profile'
      Roles:
        - !Ref EC2Role

  # ────────────────────────────────────────────────────────────────────────────
  # EC2 Instance
  # ────────────────────────────────────────────────────────────────────────────
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
        - !Ref MySQLSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          exec > /var/log/user-data.log 2>&1

          echo "=== JARVIS EC2 Bootstrap ==="
          date

          # Update system
          dnf update -y

          # Install Docker
          dnf install -y docker
          systemctl enable docker
          systemctl start docker

          # Install Docker Compose v2
          mkdir -p /usr/local/lib/docker/cli-plugins
          COMPOSE_VERSION=$(curl -s https://api.github.com/repos/docker/compose/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -SL "https://github.com/docker/compose/releases/download/${!COMPOSE_VERSION}/docker-compose-linux-x86_64" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          ln -sf /usr/local/lib/docker/cli-plugins/docker-compose /usr/local/bin/docker-compose

          # Add ec2-user to docker group
          usermod -aG docker ec2-user

          # Install nginx
          dnf install -y nginx
          systemctl enable nginx

          # Install certbot
          dnf install -y certbot python3-certbot-nginx

          # Install git
          dnf install -y git

          # Create app directory
          mkdir -p /opt/jarvis
          chown ec2-user:ec2-user /opt/jarvis

          # Enable automatic security updates
          dnf install -y dnf-automatic
          sed -i 's/apply_updates = no/apply_updates = yes/' /etc/dnf/automatic.conf
          systemctl enable --now dnf-automatic-install.timer

          # Set up log rotation for app logs
          cat > /etc/logrotate.d/jarvis <<'LOGROTATE'
          /opt/jarvis/logs/*.log {
              daily
              missingok
              rotate 14
              compress
              delaycompress
              notifempty
              create 0644 ec2-user ec2-user
          }
          LOGROTATE

          mkdir -p /opt/jarvis/logs
          chown ec2-user:ec2-user /opt/jarvis/logs

          echo "=== Bootstrap complete ==="
          date
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-ec2'

  # Elastic IP
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-eip'

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      InstanceId: !Ref EC2Instance

# ==============================================================================
# Outputs
# ==============================================================================
Outputs:
  EC2PublicIP:
    Description: Public IP address of the EC2 instance
    Value: !Ref ElasticIP
    Export:
      Name: !Sub '${EnvironmentName}-ec2-ip'

  EC2InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub '${EnvironmentName}-user-pool-id'

  CognitoAppClientId:
    Description: Cognito App Client ID
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub '${EnvironmentName}-app-client-id'

  CognitoDomain:
    Description: Cognito hosted UI domain
    Value: !Sub 'https://${EnvironmentName}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com'
    Export:
      Name: !Sub '${EnvironmentName}-cognito-domain'

  VPCId:
    Description: VPC ID
    Value: !Ref VPC

  SecurityGroupId:
    Description: EC2 Security Group ID
    Value: !Ref EC2SecurityGroup

  SSMConnectCommand:
    Description: Command to connect via SSM (no SSH needed)
    Value: !Sub 'aws ssm start-session --target ${EC2Instance}'
