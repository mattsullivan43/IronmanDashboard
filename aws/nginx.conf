# ==============================================================================
# JARVIS Business Command Center - Nginx Reverse Proxy Configuration
# ==============================================================================

# ── Rate Limiting Zones ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/s;

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream jarvis_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow certbot HTTP challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ── SSL Configuration ────────────────────────────────────────────────────
    # Self-signed cert (replaced by certbot when domain is configured)
    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (enable when using real cert)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://cognito-idp.*.amazonaws.com https://*.amazoncognito.com; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide nginx version
    server_tokens off;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # ── Request Size Limits ──────────────────────────────────────────────────
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # ── Block Common Attack Patterns ─────────────────────────────────────────

    # Block access to hidden files (except .well-known)
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # Block common exploit paths
    location ~* /(wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|\.env|\.git|\.svn|\.hg) {
        deny all;
        return 404;
    }

    # Block script injection attempts
    location ~* \.(php|cgi|pl|py|sh|asp|aspx|jsp)$ {
        deny all;
        return 404;
    }

    # Block SQL injection patterns in URLs
    if ($query_string ~* "(union.*select|insert.*into|delete.*from|drop.*table|update.*set)") {
        return 403;
    }

    # Block common scanners
    if ($http_user_agent ~* (nmap|nikto|wikto|sf|sqlmap|bsqlbf|w3af|acunetix|havij|appscan)) {
        return 403;
    }

    # ── API Routes ───────────────────────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://jarvis_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://jarvis_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts for API calls (JARVIS AI might take a while)
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # ── WebSocket Support (future use) ───────────────────────────────────────
    location /ws {
        proxy_pass http://jarvis_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Static Assets (served by the app, cached by nginx) ───────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        limit_req zone=static_limit burst=50 nodelay;

        proxy_pass http://jarvis_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Default: Proxy to App (SPA routing) ──────────────────────────────────
    location / {
        limit_req zone=static_limit burst=30 nodelay;

        proxy_pass http://jarvis_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Error Pages ──────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
